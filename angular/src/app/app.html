<div class="app-shell">
  <header class="app-header">
    <div class="app-header-left">
      <span class="app-logo">TF</span>
      <div class="app-title-group">
        <h1 class="app-title">TaskFlow Experimental App</h1>
        <span class="app-subtitle">Framework Performance Study</span>
      </div>
    </div>
    <div class="app-header-right" *ngIf="isAuthenticated()">
      <nav class="app-nav">
        <a routerLink="/dashboard" routerLinkActive="active" class="app-nav-link">Dashboard</a>
        <a routerLink="/tasks" routerLinkActive="active" class="app-nav-link">Tarefas</a>
      </nav>
      <div class="app-user-area">
        <div class="app-user-info">
          <span class="app-user-email">{{ userEmail() }}</span>
          <div class="app-user-progress">
            <span class="app-user-progress-label">Conclusão</span>
            <div class="app-progress-bar">
              <div class="app-progress-bar-fill" [style.width.%]="completionPercentage()"></div>
            </div>
          </div>
      </div>
        <button type="button" class="app-button app-button-ghost" (click)="onLogout()">Sair</button>
      </div>
    </div>
  </header>
  <main class="app-main">
    <div class="app-main-inner">
      <router-outlet />
  </div>
</main>
</div>
